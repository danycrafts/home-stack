services:
  crux-docs:
    image: ghcr.io/agenticfleet/crux-docs:${CRUX_DOCS_VERSION:-main}
    container_name: crux-control-docs
    networks:
      - infra-network
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 10s
    restart: unless-stopped
