services:
  n8n:
    image: n8nio/n8n:${N8N_VERSION:-latest}
    container_name: local-n8n
    environment:
      N8N_HOST: ${N8N_SUBDOMAIN:-n8n}.${DOMAIN_NAME:-invariantcontinuum.io}
      N8N_BASIC_AUTH_ACTIVE: "false"
      N8N_EXTERNAL_AUTH_ENABLED: "true"
      N8N_EXTERNAL_AUTH_OAUTH2_ISSUER_URL: http://${KC_SUBDOMAIN:-auth}.${DOMAIN_NAME:-invariantcontinuum.io}/realms/invariant
      N8N_EXTERNAL_AUTH_OAUTH2_CLIENT_ID: n8n
      N8N_EXTERNAL_AUTH_OAUTH2_CLIENT_SECRET: n8n-client-secret
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:-changeme}
    volumes:
      - n8n-data:/home/node/.n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - infra-network
    restart: unless-stopped
