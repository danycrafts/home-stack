services:
  n8n:
    image: n8nio/n8n:${N8N_VERSION:-latest}
    container_name: local-n8n
    environment:
      # Public hostname / scheme. NPM terminates TLS at 80/443 and forwards
      # to this container's 5678 over HTTP, so the editor & webhook URLs
      # must advertise the HTTPS origin (no port suffix) — not the internal
      # http://...:5678 form, which would break OAuth callbacks and
      # webhook signing.
      N8N_HOST: ${N8N_SUBDOMAIN:-n8n}.${DOMAIN_NAME:-invariantcontinuum.io}
      N8N_PROTOCOL: https
      N8N_PORT: "5678"
      N8N_EDITOR_BASE_URL: https://${N8N_SUBDOMAIN:-n8n}.${DOMAIN_NAME:-invariantcontinuum.io}
      WEBHOOK_URL: https://${N8N_SUBDOMAIN:-n8n}.${DOMAIN_NAME:-invariantcontinuum.io}/
      N8N_PROXY_HOPS: "1"
      N8N_TRUST_PROXY: "true"
      N8N_BASIC_AUTH_ACTIVE: "false"
      # Community node installation from the Editor UI.
      N8N_ENABLE_COMMUNITY_NODES: "true"
      # Allow Code/Function nodes to read process.env (default is to block).
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_RUNNERS_MODE: external
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN:-change-me-runner-token}
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0
      N8N_NATIVE_PYTHON_RUNNER: "true"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-0/DLpWxltyEuGPePF6GEbccr1ZgLcayu}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:-changeme}
      # Expose local LLM endpoint so workflow nodes can reference it
      N8N_DENSE_LLM_URL: ${N8N_DENSE_LLM_URL:-http://host.docker.internal:8102/v1}
      N8N_DENSE_LLM_API_KEY: ${N8N_DENSE_LLM_API_KEY:-test}
    volumes:
      - n8n-data:/home/node/.n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    depends_on:
      postgres:
        condition: service_healthy
          #keycloak:
          #condition: service_started
    networks:
      - infra-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5678/healthz', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  n8n-runners:
    image: n8nio/runners:${N8N_VERSION:-latest}
    container_name: local-n8n-runners
    environment:
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN:-change-me-runner-token}
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679
      N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT: "15"
    depends_on:
      - n8n
    networks:
      - infra-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
