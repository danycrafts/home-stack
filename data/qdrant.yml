services:
  qdrant:
    image: qdrant/qdrant:${QDRANT_VERSION:-latest}
    container_name: local-qdrant
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    networks:
      - infra-network
    # Note: Healthcheck disabled - Qdrant image doesn't include curl/wget
    # Service health can be verified via: curl http://localhost:6333/readyz
    restart: unless-stopped
