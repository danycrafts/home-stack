services:
  neo4j:
    image: neo4j:${NEO4J_VERSION:-5.16-community}
    container_name: local-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: ${NEO4J_HEAP_SIZE:-512m}
      NEO4J_dbms_memory_heap_max__size: ${NEO4J_HEAP_SIZE:-512m}
    volumes:
      - neo4j-data:/data
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    networks:
      - infra-network
    # Note: Healthcheck disabled - Neo4j image wget may not be available during startup
    # Service health can be verified via: curl http://localhost:7474
    restart: unless-stopped
