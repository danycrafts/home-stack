services:
  postgres:
    build:
      context: ../services/postgres
      dockerfile: Dockerfile
    image: local-postgres:16-age-pgvector
    container_name: local-postgres
    command: >
      postgres
      -c shared_preload_libraries=age
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      # Additional DB credentials for init script
      N8N_DB_NAME: ${N8N_DB_NAME:-n8n}
      N8N_DB_USER: ${N8N_DB_USER:-n8n}
      N8N_DB_PASSWORD: ${N8N_DB_PASSWORD:-changeme}
      KC_DB_NAME: ${KC_DB_NAME:-keycloak}
      KC_DB_USER: ${KC_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-changeme}
      # Substrate Platform
      SUBSTRATE_INGESTION_DB_NAME: ${SUBSTRATE_INGESTION_DB_NAME:-substrate_ingestion}
      SUBSTRATE_INGESTION_DB_USER: ${SUBSTRATE_INGESTION_DB_USER:-substrate_ingestion}
      SUBSTRATE_INGESTION_DB_PASSWORD: ${SUBSTRATE_INGESTION_DB_PASSWORD:-changeme}
      SUBSTRATE_GRAPH_DB_NAME: ${SUBSTRATE_GRAPH_DB_NAME:-substrate_graph}
      SUBSTRATE_GRAPH_DB_USER: ${SUBSTRATE_GRAPH_DB_USER:-substrate_graph}
      SUBSTRATE_GRAPH_DB_PASSWORD: ${SUBSTRATE_GRAPH_DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../services/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    networks:
      - infra-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
