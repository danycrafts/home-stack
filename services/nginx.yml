services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: home-stack-nginx:latest
    container_name: home-stack-nginx
    environment:
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-admin@invariantcontinuum.io}
      CERTBOT_DOMAINS: ${CERTBOT_DOMAINS:-auth.invariantcontinuum.io pgadmin.invariantcontinuum.io redis.invariantcontinuum.io nginx.invariantcontinuum.io}
      CERTBOT_STAGING: ${CERTBOT_STAGING:-false}
    ports:
      - "80:80"
      - "443:443"
      - "5432:5432"
      - "6379:6379"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/stream.conf:/etc/nginx/stream.conf:ro
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/letsencrypt:/etc/letsencrypt
      - ./nginx/logs:/var/log/nginx
      - ./nginx/logrotate.d/nginx:/etc/logrotate.d/nginx:ro
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      pgadmin:
        condition: service_started
      redis:
        condition: service_healthy
      redis-commander:
        condition: service_started
    networks:
      - infra-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/healthz >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped
