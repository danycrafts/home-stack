server {
    listen 80;
    server_name docs.invariantcontinuum.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 8443 ssl;
    http2 on;
    server_name docs.invariantcontinuum.io;

    ssl_certificate /etc/letsencrypt/live/docs.invariantcontinuum.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.invariantcontinuum.io/privkey.pem;
    include /etc/nginx/snippets/ssl.conf;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        proxy_pass http://crux-docs:8080;
        include /etc/nginx/snippets/proxy.conf;
    }
}
