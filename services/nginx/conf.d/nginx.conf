server {
    listen 80;
    server_name nginx.invariantcontinuum.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name nginx.invariantcontinuum.io;

    ssl_certificate /etc/letsencrypt/live/nginx.invariantcontinuum.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nginx.invariantcontinuum.io/privkey.pem;
    include /etc/nginx/snippets/ssl.conf;

    location / {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"home-stack-nginx"}\n';
    }
}
