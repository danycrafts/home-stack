name: home-stack

include:
  - path: ./core/postgres.yml
  - path: ./core/redis.yml
  - path: ./core/nats.yml
  - path: ./data/minio.yml
  - path: ./data/qdrant.yml
  - path: ./data/neo4j.yml
  - path: ./data/elasticsearch.yml
  - path: ./apps/pgadmin.yml
  - path: ./apps/keycloak.yml
  - path: ./apps/n8n.yml
  - path: ./apps/nginx-proxy-manager.yml

networks:
  infra-network:
    name: local-infra-network
    driver: bridge

volumes:
  postgres-data:
    name: local-postgres-data
  pgadmin-data:
    name: local-pgadmin-data
  n8n-data:
    name: local-n8n-data
  npm-data:
    name: local-npm-data
  npm-letsencrypt:
    name: local-npm-letsencrypt
  redis-data:
    name: local-redis-data
  minio-data:
    name: local-minio-data
  qdrant-data:
    name: local-qdrant-data
  neo4j-data:
    name: local-neo4j-data
  es-data:
    name: local-es-data
  nats-data:
    name: local-nats-data
  nats-data-2:
    name: local-nats-data-2
  nats-data-3:
    name: local-nats-data-3
